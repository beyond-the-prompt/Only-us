<!doctype html>
<html lang="en">
<head>
    <title>Onlyus — Private Chat & Video by Billy Barbeau</title>
    <link rel="shortcut icon" href="../images/favicon.ico" />
    <link rel="apple-touch-icon" href="../images/Logo.png" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
    <link rel="stylesheet" href="../css/onlyus-metal.css" />

    <style>
        body {
            background: #0a0a0a url('../images/preview.jpg') center/cover fixed;
            color: #ddd;
            font-family: system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .overlay {
            background: linear-gradient(180deg, rgba(10,10,10,0.95), rgba(100,0,0,0.85));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 5rem; color: #ff0000; text-shadow: 0 0 40px #f00; letter-spacing: 6px; }
        .tagline { font-size: 2rem; color: #ffaaaa; margin: 20px 0 40px; }
        input { padding: 15px; width: 320px; font-size: 1.3rem; background:#111; border:3px solid #500; color:white; }
        button { padding: 18px 60px; font-size: 1.5rem; background:#900; color:white; border:4px solid #f00; margin:10px; cursor:pointer; }
        button:hover { background:#c00; transform:scale(1.05); }
    </style>
</head>
<body>
    <div class="overlay">
        <div>
            <img src="../images/Logo.png" width="200" alt="Onlyus" style="margin-bottom:20px;">
            <h1>ONLYUS</h1>
            <div class="tagline">PRIVATE CHAT & VIDEO</div>
            <p style="max-width:600px; margin:0 auto 40px; font-size:1.3rem;">
                End-to-end encrypted peer-to-peer.<br>
                No tracking. No servers.<br>
                Made by Billy Barbeau.
            </p>
            <input id="roomName" type="text" value="onlyus" maxlength="32" />
            <br><br>
            <button onclick="joinRoom()">JOIN ROOM</button>
            <button onclick="alert('Customize coming soon')">CUSTOMIZE ROOM</button>
        </div>
    </div>

    <script>
        function joinRoom() {
            const room = document.getElementById('roomName').value || "onlyus";
            window.location.href = `../newcall.html?room=${room}`;
        }
    </script>
</body>
</html>
